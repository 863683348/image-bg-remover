<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <i data-lucide="wand-sparkles" size="20"></i>
          <span>Background Remover</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- Upload (default state) -->
      <section class="upload" id="uploadSection">
        <div class="upload-zone" id="uploadZone">
          <i data-lucide="image-up" size="40" class="upload-icon"></i>
          <p class="upload-title">Drop image here</p>
          <p class="upload-hint">or click to browse &middot; JPG, PNG, WebP</p>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
      </section>

      <!-- Preview & Process -->
      <section class="preview hidden" id="previewSection">
        <div class="preview-layout">
          <div class="preview-card">
            <div class="preview-card-header">
              <i data-lucide="image" size="16"></i>
              <span>Original</span>
            </div>
            <div class="preview-card-body">
              <img id="originalPreview" alt="">
            </div>
          </div>
          <div class="preview-arrow">
            <i data-lucide="arrow-right" size="24"></i>
          </div>
          <div class="preview-card">
            <div class="preview-card-header">
              <i data-lucide="sparkles" size="16"></i>
              <span>Result</span>
            </div>
            <div class="preview-card-body" id="resultBody">
              <div class="checkerboard" id="resultContainer">
                <img id="resultPreview" class="hidden" alt="">
              </div>
              <div class="result-placeholder" id="resultPlaceholder">
                <i data-lucide="wand-sparkles" size="32"></i>
                <p>Click to remove background</p>
              </div>
            </div>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="processBtn">
            <i data-lucide="wand-sparkles" size="16"></i>
            Remove Background
          </button>
          <button class="btn btn-secondary" id="changeBtn">
            <i data-lucide="rotate-ccw" size="16"></i>
            Change Image
          </button>
        </div>

        <div class="controls controls-result hidden" id="resultControls">
          <div class="bg-options">
            <span class="bg-label">Background</span>
            <div class="bg-swatches" id="bgSwatches">
              <button class="swatch active" data-color="checker" title="Transparent" style="background-image: linear-gradient(45deg,#ccc 25%,transparent 25%,transparent 75%,#ccc 75%),linear-gradient(45deg,#ccc 25%,transparent 25%,transparent 75%,#ccc 75%);background-size:12px 12px;background-position:0 0,6px 6px;"></button>
              <button class="swatch" data-color="#ffffff" title="White" style="background:#fff;border-color:#ddd;"></button>
              <button class="swatch" data-color="#000000" title="Black" style="background:#000;"></button>
              <button class="swatch" data-color="#ff6b6b" title="Red" style="background:#ff6b6b;"></button>
              <button class="swatch" data-color="#4ecdc4" title="Teal" style="background:#4ecdc4;"></button>
              <button class="swatch" data-color="#45b7d1" title="Blue" style="background:#45b7d1;"></button>
              <button class="swatch custom-swatch" id="customBg" title="Custom color">
                <i data-lucide="palette" size="14"></i>
              </button>
              <input type="color" id="colorPicker" value="#ff6b6b" hidden>
            </div>
          </div>
          <div class="download-group">
            <button class="btn btn-download" id="downloadBtn">
              <i data-lucide="download" size="16"></i>
              Download PNG
            </button>
            <button class="btn btn-secondary" id="resetBtn">
              <i data-lucide="trash-2" size="16"></i>
              New Image
            </button>
          </div>
        </div>
      </section>

      <!-- Loading overlay -->
      <div class="loading hidden" id="loadingOverlay">
        <div class="loading-content">
          <div class="spinner"></div>
          <p>Removing background...</p>
        </div>
      </div>

      <!-- Error toast -->
      <div class="error-toast hidden" id="errorToast">
        <i data-lucide="circle-alert" size="16"></i>
        <span id="errorMessage"></span>
        <button class="error-close" id="errorClose">
          <i data-lucide="x" size="14"></i>
        </button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>lucide.createIcons()</script>
</body>
</html>
